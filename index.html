<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Maintenance Task Manager</title>
  <style>
    :root { 
      --primary: #2563eb; 
      --success: #10b981; 
      --pending: #f59e0b; 
      --danger: #ef4444; 
      --bg: #f8fafc; 
      --text-main: #1e293b;
      --text-muted: #94a3b8;
      --card-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --task-height: 80px;
      --task-padding: 16px;
      --task-font: 1rem;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: -apple-system, system-ui, sans-serif; 
      background: var(--bg); 
      margin: 0; 
      padding: 16px; 
      color: var(--text-main); 
      padding-bottom: 100px;
      overflow-x: hidden;
      min-height: 100vh;
    }
    
    h1 { text-align: center; color: var(--text-main); font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin: 10px 0 20px 0; }
    
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: var(--card-shadow); margin-bottom: 16px; border: 1px solid #e2e8f0; }
    .hidden { display: none !important; }
    
    .task-item { 
      display: flex; 
      align-items: center; 
      background: white; 
      margin-bottom: 8px; 
      border-radius: 10px; 
      border: 1px solid #e2e8f0; 
      min-height: var(--task-height);
      position: relative;
    }
    
    .dragging { opacity: 0.4; transform: scale(1.02); background: #eff6ff; border: 2px solid var(--primary); z-index: 1000; }

    .status-toggle { 
      padding: 0 15px; 
      background: #f1f5f9; 
      border-right: 1px solid #e2e8f0; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      align-self: stretch;
      width: 60px;
      border-radius: 10px 0 0 10px;
    }

    .task-info { flex: 1; padding: var(--task-padding); font-weight: 600; font-size: var(--task-font); overflow: hidden; }
    .sub-text { display: block; font-size: 0.75rem; color: #64748b; font-weight: 400; margin-top: 2px; }
    
    .drag-handle { 
      padding: 0 20px; 
      color: #cbd5e1; 
      font-size: 1.4rem; 
      cursor: grab; 
      align-self: stretch; 
      display: flex; 
      align-items: center;
      touch-action: none; 
    }

    .tick { width: 26px; height: 26px; border: 2px solid #cbd5e1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .is-done { background: var(--success); border-color: var(--success); color: white; }
    .is-pending { background: var(--pending); border-color: var(--pending); color: white; }
    
    .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
    .btn-main { background: var(--primary); color: white; }
    .btn-outline { background: white; color: var(--text-main); border: 1px solid #e2e8f0; }
    .btn-restore { background: #ecfdf5; color: var(--success); border: 1px solid #d1fae5; }
    .btn-danger { background: #fef2f2; color: var(--danger); border: 1px solid #fee2e2; }
    
    /* MODAL OVERLAY */
    #customModalOverlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px);
      z-index: 3000; 
      display: none; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
      pointer-events: none; 
    }
    #customModalOverlay.active { display: flex; pointer-events: auto; }
    .modal-box { background: white; width: 100%; max-width: 400px; border-radius: 16px; padding: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .modal-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; color: var(--text-main); }
    .modal-body { color: #64748b; font-size: 0.9rem; margin-bottom: 20px; }
    .modal-input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; margin-bottom: 20px; font-family: inherit; }
    .modal-actions { display: flex; gap: 12px; }
    
    .log-meta { color: var(--text-muted); font-size: 0.85rem; display: block; margin-bottom: 8px; font-weight: 400; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 8px; }
    .thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid #e2e8f0; }
    
    #photoModal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.95); z-index:2000; display:none; align-items:center; justify-content:center; }
    #photoModal img { max-width: 95%; max-height: 90%; border-radius: 4px; }

    label { display: block; font-weight: 700; margin: 16px 0 6px 0; color: #64748b; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
    input, textarea { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; margin-bottom: 4px; background: #fff; }
    
    .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; border-top: 1px solid #e2e8f0; padding: 12px 16px; gap: 12px; z-index: 100; }
    .nav-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 700; background: #f1f5f9; color: #64748b; }
    .nav-active { background: var(--primary); color: white; }
  </style>
</head>
<body>

  <div id="customModalOverlay">
    <div class="modal-box">
      <div id="modalTitle" class="modal-title">Enter Details</div>
      <div id="modalText" class="modal-body">Please provide more information below.</div>
      <textarea id="modalInput" class="modal-input" rows="3"></textarea>
      <div class="modal-actions">
        <button class="btn btn-outline" style="margin-bottom:0" onclick="closeModal(false)">Cancel</button>
        <button class="btn btn-main" style="margin-bottom:0" onclick="closeModal(true)">OK</button>
      </div>
    </div>
  </div>

  <div id="photoModal" onclick="this.style.display='none'"><img id="modalImg"></div>

  <h1>Maintenance List</h1>

  <div id="activeView">
    <button class="btn btn-main" style="height: 60px;" onclick="createNewTask()">NEW TASK</button>
    <div id="activeList"></div>
    <button class="btn btn-outline" style="margin-top:20px" onclick="archiveDone()">Archive Finished Tasks</button>
  </div>

  <div id="historyView" class="hidden">
    <div id="historyList"></div>
    <button class="btn btn-danger" onclick="clearAllHistory()">Permanent Wipe History</button>
  </div>

  <div id="detailsView" class="hidden">
    <button class="btn btn-outline" style="width: auto; display: inline-flex; padding: 10px 20px;" onclick="goHome()">← Back</button>
    <div id="displayMode" class="card">
      <h2 id="viewName" style="margin: 4px 0 12px 0;"></h2>
      <label>Location</label><div id="viewLoc" style="margin-bottom:12px;"></div>
      <label>Description</label><div id="viewDesc" style="white-space: pre-wrap; font-size: 0.95rem; background:#f8fafc; padding:16px; border-radius:8px;"></div>
      <label>Recheck Date</label><div id="viewRecheck" style="font-weight:700; color:var(--pending);"></div>
      <label>Photos</label><div id="viewPhotos" class="photo-grid"></div>
      <div style="margin-top:25px; border-top: 1px solid #eee; padding-top: 16px;">
        <button class="btn btn-main" id="editBtn" onclick="openEdit()">Edit Task</button>
        <button class="btn btn-restore hidden" id="restoreBtn" onclick="restoreTask()">Restore to Active</button>
        <button class="btn btn-danger hidden" id="histDelBtn" onclick="deleteHistoryTask()">Delete Permanent</button>
      </div>
    </div>
    <div id="editMode" class="card hidden">
      <label>Task Name</label><input type="text" id="editName">
      <label>Location</label><input type="text" id="editLoc">
      <label>Description</label><textarea id="editDesc" rows="6"></textarea>
      <label>Next Recheck</label><input type="date" id="editRecheck">
      <label>Photos</label>
      <div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="document.getElementById('camInput').click()">📷 Camera</button><button class="btn btn-outline" onclick="document.getElementById('libInput').click()">🖼️ Gallery</button></div>
      <input type="file" id="camInput" class="hidden" accept="image/*" capture="environment"><input type="file" id="libInput" class="hidden" accept="image/*">
      <div id="editPhotos" class="photo-grid"></div>
      <button class="btn btn-main" style="background:var(--success); margin-top:24px" onclick="saveTask()">Save Task</button>
    </div>
  </div>

  <div class="nav-bar" id="bottomNav">
    <button class="nav-btn nav-active" id="navActive" onclick="showView('active')">Active</button>
    <button class="nav-btn" id="navHistory" onclick="showView('history')">Completed</button>
  </div>

  <script>
    let activeTasks = JSON.parse(localStorage.getItem("pro_v6_active")) || [];
    let historyTasks = JSON.parse(localStorage.getItem("pro_v6_history")) || [];
    let currentIdx = -1;
    let isNewTask = false;
    let tempImgs = [];
    let dragItem = null;

    // --- VIEW CONTROLLER FIX ---
    function showView(view) {
      // MASTER RESET: Always hide details/edit mode when using nav tabs
      document.getElementById("detailsView").classList.add("hidden");
      document.getElementById("bottomNav").classList.remove("hidden");
      
      document.getElementById("activeView").classList.toggle("hidden", view !== 'active');
      document.getElementById("historyView").classList.toggle("hidden", view !== 'history');
      
      document.getElementById("navActive").classList.toggle("nav-active", view === 'active');
      document.getElementById("navHistory").classList.toggle("nav-active", view === 'history');
    }

    // --- MODAL ---
    let modalCallback = null;
    function openModal(title, text, showInput, callback) {
      document.getElementById("modalTitle").innerText = title;
      document.getElementById("modalText").innerText = text;
      const input = document.getElementById("modalInput");
      input.value = "";
      input.style.display = showInput ? "block" : "none";
      document.getElementById("customModalOverlay").classList.add("active");
      if(showInput) setTimeout(() => input.focus(), 150);
      modalCallback = callback;
    }
    function closeModal(confirm) {
      document.getElementById("customModalOverlay").classList.remove("active");
      if (modalCallback) {
        const val = document.getElementById("modalInput").value;
        modalCallback(confirm ? (val || true) : false);
        modalCallback = null;
      }
    }

    // --- DATA & SYNC ---
    function sync() {
      localStorage.setItem("pro_v6_active", JSON.stringify(activeTasks));
      localStorage.setItem("pro_v6_history", JSON.stringify(historyTasks));
      const count = activeTasks.length;
      const root = document.documentElement;
      if (count <= 5) { root.style.setProperty('--task-height', '80px'); root.style.setProperty('--task-font', '1rem'); }
      else if (count <= 10) { root.style.setProperty('--task-height', '65px'); root.style.setProperty('--task-font', '0.95rem'); }
      else { root.style.setProperty('--task-height', '52px'); root.style.setProperty('--task-font', '0.88rem'); }
      render();
    }

    // --- DRAG (HANDLE ONLY) ---
    function initDrag(item, handle) {
      handle.addEventListener('touchstart', (e) => {
        dragItem = item;
        item.classList.add('dragging');
      }, { passive: true });
    }
    window.addEventListener('touchend', () => {
      if (!dragItem) return;
      dragItem.classList.remove('dragging');
      const items = [...document.querySelectorAll('#activeList .task-item')];
      activeTasks = items.map(el => activeTasks[parseInt(el.dataset.index)]);
      dragItem = null;
      sync();
    });
    window.addEventListener('touchmove', (e) => {
      if (!dragItem) return;
      e.preventDefault();
      const list = document.getElementById('activeList');
      const touch = e.touches[0];
      const afterElement = getDragAfterElement(list, touch.clientY);
      if (afterElement == null) list.appendChild(dragItem);
      else list.insertBefore(dragItem, afterElement);
    }, { passive: false });
    function getDragAfterElement(container, y) {
      const els = [...container.querySelectorAll('.task-item:not(.dragging)')];
      return els.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
        else return closest;
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    // --- ACTIONS ---
    function toggleDone(idx, e) {
      e.stopPropagation();
      const task = activeTasks[idx];
      if(!task.done) {
        openModal("Outcome", "Enter resolution notes:", true, (res) => {
          if(res) {
            task.desc += `\nResolved: ${new Date().toLocaleDateString()}\nOutcome: ${res === true ? 'Completed' : res}`;
            task.done = true; sync();
          }
        });
      } else { task.done = false; sync(); }
    }

    function render() {
      const aList = document.getElementById("activeList");
      aList.innerHTML = "";
      activeTasks.forEach((task, i) => {
        let tickClass = ""; if(task.done) tickClass = task.recheck ? "is-pending" : "is-done";
        const item = document.createElement('div');
        item.className = 'task-item'; item.dataset.index = i;
        item.innerHTML = `<div class="status-toggle" onclick="toggleDone(${i}, event)"><div class="tick ${tickClass}">${task.done ? '✓' : ''}</div></div>
          <div class="task-info" onclick="viewTask(${i}, false)">${task.name}<span class="sub-text">${task.loc || ''}</span></div>
          <div class="drag-handle">≡</div>`;
        initDrag(item, item.querySelector('.drag-handle'));
        aList.appendChild(item);
      });
      const hList = document.getElementById("historyList");
      hList.innerHTML = "";
      historyTasks.forEach((task, i) => {
        hList.innerHTML += `<div class="task-item" onclick="viewTask(${i}, true)"><div class="task-info" style="padding-left:20px">${task.name}<span class="sub-text">Archived</span></div></div>`;
      });
    }

    function createNewTask() {
      isNewTask = true; currentIdx = -1; tempImgs = [];
      document.getElementById("editName").value = ""; document.getElementById("editLoc").value = "";
      document.getElementById("editDesc").value = "Created: " + new Date().toLocaleDateString() + "\n";
      document.getElementById("editRecheck").value = ""; document.getElementById("editPhotos").innerHTML = "";
      showForm();
    }
    function saveTask() {
      const data = { name: document.getElementById("editName").value || "Unnamed", loc: document.getElementById("editLoc").value, desc: document.getElementById("editDesc").value, recheck: document.getElementById("editRecheck").value, imgs: tempImgs, done: false };
      if(isNewTask) activeTasks.push(data); else activeTasks[currentIdx] = data;
      sync(); goHome();
    }
    function viewTask(idx, isHistory) {
      currentIdx = idx; const task = isHistory ? historyTasks[idx] : activeTasks[idx];
      tempImgs = [...task.imgs];
      document.getElementById("activeView").classList.add("hidden"); document.getElementById("historyView").classList.add("hidden");
      document.getElementById("detailsView").classList.remove("hidden"); document.getElementById("displayMode").classList.remove("hidden");
      document.getElementById("editMode").classList.add("hidden");
      document.getElementById("viewName").innerText = task.name; document.getElementById("viewLoc").innerText = task.loc || "No Location";
      document.getElementById("viewRecheck").innerText = task.recheck || "None";
      let d = task.desc;
      if (d.startsWith("Created:")) {
        let lines = d.split('\n'); let first = lines.shift();
        document.getElementById("viewDesc").innerHTML = `<span class="log-meta">${first}</span>` + lines.join('\n');
      } else { document.getElementById("viewDesc").innerText = d; }
      document.getElementById("viewPhotos").innerHTML = task.imgs.map(s => `<img src="${s}" class="thumb" onclick="zoom('${s}')">`).join('');
      document.getElementById("editBtn").classList.toggle("hidden", isHistory);
      document.getElementById("restoreBtn").classList.toggle("hidden", !isHistory);
      document.getElementById("histDelBtn").classList.toggle("hidden", !isHistory);
    }
    function archiveDone() {
      const toArch = activeTasks.filter(t => t.done && !t.recheck);
      if(toArch.length === 0) return openModal("No Tasks", "No finished tasks to archive.", false);
      historyTasks = [...toArch, ...historyTasks];
      activeTasks = activeTasks.filter(t => !(t.done && !t.recheck));
      sync();
    }
    function restoreTask() { activeTasks.push(historyTasks[currentIdx]); historyTasks.splice(currentIdx,1); sync(); goHome(); }
    function deleteHistoryTask() { openModal("Delete?", "Remove permanently?", false, (c) => { if(c) { historyTasks.splice(currentIdx,1); sync(); goHome(); } }); }
    function clearAllHistory() { openModal("Wipe?", "Delete all history?", false, (c) => { if(c) { historyTasks = []; sync(); } }); }
    function zoom(s) { document.getElementById("modalImg").src = s; document.getElementById("photoModal").style.display = "flex"; }
    function openEdit() { 
      const t = activeTasks[currentIdx]; isNewTask = false;
      document.getElementById("displayMode").classList.add("hidden"); document.getElementById("editMode").classList.remove("hidden");
      document.getElementById("editName").value = t.name; document.getElementById("editLoc").value = t.loc;
      document.getElementById("editDesc").value = t.desc; document.getElementById("editRecheck").value = t.recheck;
      renderEditPhotos();
    }
    function showForm() { document.getElementById("activeView").classList.add("hidden"); document.getElementById("historyView").classList.add("hidden"); document.getElementById("detailsView").classList.remove("hidden"); document.getElementById("bottomNav").classList.add("hidden"); document.getElementById("displayMode").classList.add("hidden"); document.getElementById("editMode").classList.remove("hidden"); }
    function goHome() { document.getElementById("detailsView").classList.add("hidden"); document.getElementById("activeView").classList.remove("hidden"); document.getElementById("bottomNav").classList.remove("hidden"); }
    function removeImg(i) { tempImgs.splice(i, 1); renderEditPhotos(); }
    function renderEditPhotos() { document.getElementById("editPhotos").innerHTML = tempImgs.map((s, i) => `<div style="position:relative"><img src="${s}" class="thumb"><button onclick="removeImg(${i})" style="position:absolute;top:-5px;right:-5px;background:var(--danger);color:white;border:none;border-radius:50%;width:24px;height:24px;">✕</button></div>`).join(''); }
    [document.getElementById('camInput'), document.getElementById('libInput')].forEach(i => { i.onchange = (e) => { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ev) => { tempImgs.push(ev.target.result); renderEditPhotos(); }; r.readAsDataURL(f); }; });

    sync();
  </script>
</body>
  </html>
