<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance Log</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
    h1 { color: #2c3e50; text-align: center; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
    .item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
    .bubble { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #3498db; margin-right: 15px; flex-shrink: 0; }
    .done-bubble { background: #27ae60; border-color: #27ae60; }
    .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; color: white; background: #3498db; margin: 5px; font-weight: bold; }
    .btn-del { background: #e74c3c; }
    input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .hidden { display: none; }
    .thumb { width: 80px; height: 80px; object-fit: cover; margin: 5px; border-radius: 8px; border: 1px solid #ccc; }
    .info-label { font-weight: bold; color: #7f8c8d; font-size: 0.8em; text-transform: uppercase; margin-top: 15px; }
  </style>
</head>
<body>

  <div id="mainView">
    <h1>Maintenance Log</h1>
    <input type="text" id="taskInput" placeholder="Enter new job name...">
    <button class="btn" onclick="addTask()">Add Job</button>
    <button class="btn btn-del" onclick="clearDone()">Clear Done</button>
    <div id="taskList" class="card"></div>
  </div>

  <div id="details" class="card hidden">
    <button class="btn" onclick="goBack()">« Back</button>
    <button id="editSaveBtn" class="btn" onclick="toggleEdit()">Edit</button>
    
    <div id="displayMode">
      <h2 id="viewName"></h2>
      <p class="info-label">Location</p> <p id="viewLoc"></p>
      <p class="info-label">Details</p> <p id="viewDesc"></p>
      <p class="info-label">Recheck Date</p> <p id="viewRecheck"></p>
      <p class="info-label">Photos</p> <div id="viewPhotos"></div>
    </div>

    <div id="editMode" class="hidden">
      <input type="text" id="editLoc" placeholder="Location">
      <textarea id="editDesc" rows="3" placeholder="Job Details"></textarea>
      <label>Recheck Date:</label>
      <input type="date" id="editRecheck">
      <label>Add Photos (Up to 5):</label>
      <input type="file" accept="image/*" capture="environment" onchange="handleFile(event)">
      <div id="editPhotos"></div>
    </div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem("jobs")) || [];
    let currentIdx = -1;
    let isEditing = false;

    function save() { localStorage.setItem("jobs", JSON.stringify(tasks)); render(); }

    function addTask() {
      let name = document.getElementById("taskInput").value;
      if (!name) return;
      tasks.push({ name, date: new Date().toLocaleDateString(), done: false, desc: "", loc: "", recheck: "", imgs: [] });
      save();
      document.getElementById("taskInput").value = "";
    }

    function toggle(i, event) { event.stopPropagation(); tasks[i].done = !tasks[i].done; save(); }
    function clearDone() { tasks = tasks.filter(t => !t.done); save(); }

    function openDetails(i) {
      currentIdx = i; isEditing = false;
      document.getElementById("mainView").classList.add("hidden");
      document.getElementById("details").classList.remove("hidden");
      document.getElementById("editMode").classList.add("hidden");
      document.getElementById("displayMode").classList.remove("hidden");
      document.getElementById("editSaveBtn").innerText = "Edit";
      
      let t = tasks[i];
      document.getElementById("viewName").innerText = t.name;
      document.getElementById("viewLoc").innerText = t.loc || "No location set";
      document.getElementById("viewDesc").innerText = t.desc || "No details";
      document.getElementById("viewRecheck").innerText = t.recheck || "No date set";
      document.getElementById("viewPhotos").innerHTML = t.imgs.map(img => `<img src="${img}" class="thumb">`).join('');
    }

    function toggleEdit() {
      if (!isEditing) {
        document.getElementById("editLoc").value = tasks[currentIdx].loc;
        document.getElementById("editDesc").value = tasks[currentIdx].desc;
        document.getElementById("editRecheck").value = tasks[currentIdx].recheck;
        document.getElementById("editPhotos").innerHTML = tasks[currentIdx].imgs.map(img => `<img src="${img}" class="thumb">`).join('');
        document.getElementById("editMode").classList.remove("hidden");
        document.getElementById("displayMode").classList.add("hidden");
        document.getElementById("editSaveBtn").innerText = "Save";
      } else {
        tasks[currentIdx].loc = document.getElementById("editLoc").value;
        tasks[currentIdx].desc = document.getElementById("editDesc").value;
        tasks[currentIdx].recheck = document.getElementById("editRecheck").value;
        save();
        openDetails(currentIdx);
      }
      isEditing = !isEditing;
    }

    function handleFile(event) {
      let file = event.target.files[0];
      if (!file || tasks[currentIdx].imgs.length >= 5) return;
      let reader = new FileReader();
      reader.onload = (e) => {
        tasks[currentIdx].imgs.push(e.target.result);
        document.getElementById("editPhotos").innerHTML = tasks[currentIdx].imgs.map(img => `<img src="${img}" class="thumb">`).join('');
      };
      reader.readAsDataURL(file);
    }

    function goBack() { document.getElementById("mainView").classList.remove("hidden"); document.getElementById("details").classList.add("hidden"); }

    function render() {
      let list = document.getElementById("taskList");
      list.innerHTML = "";
      tasks.forEach((t, i) => {
        let div = document.createElement("div");
        div.className = "item";
        div.onclick = () => openDetails(i);
        div.innerHTML = `<div class="bubble ${t.done ? 'done-bubble' : ''}" onclick="toggle(${i}, event)"></div> <span>${t.name}</span>`;
        list.appendChild(div);
      });
    }
    render();
  </script>
</body>
</html>
